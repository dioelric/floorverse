<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="FloorVerse — Experience Spaces Before You Visit. 3D floor plan & property visualization platform." />

    <!-- PWA theme & status bar -->
    <meta name="theme-color" content="#1A3C6B" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FloorVerse" />
    <meta name="application-name" content="FloorVerse" />
    <meta name="msapplication-TileColor" content="#1A3C6B" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#1A3C6B" />

    <!-- Manifest (vite-plugin-pwa injects this automatically on build;
         the explicit link ensures dev mode also picks it up) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>FloorVerse — Experience Spaces Before You Visit</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
